<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Código MagisTV / XuperTV</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,800;0,900;1,900&family=JetBrains+Mono:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          hero: ["'Barlow Condensed'", "Arial Narrow", "sans-serif"],
          mono: ["'JetBrains Mono'", "monospace"],
          body: ["'Inter'", "sans-serif"],
        },
        colors: {
          brand:   "#0a0a0a",
          accent:  "#e8000d",
          success: "#00c896",
          muted:   "#888888",
          bg:      "#e8e8ed",
        },
        keyframes: {
          popIn: { from: { transform:"scale(0.88)", opacity:"0" }, to: { transform:"scale(1)", opacity:"1" } },
          fadeIn: { from: { opacity:"0" }, to: { opacity:"1" } },
        },
        animation: {
          popIn: "popIn 0.3s cubic-bezier(.22,.68,0,1.2) forwards",
          fadeIn: "fadeIn 0.2s ease forwards",
        },
      },
    },
  };
</script>

<style>
  * { box-sizing: border-box; }
  body { font-family: "Inter", sans-serif; background: #e8e8ed; min-height: 100vh; }

  /* Modal overlay */
  #survey-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0;
  }
  #survey-overlay.active {
    display: flex;
    animation: fadeIn 0.2s ease forwards;
  }

  /* Modal box */
  #survey-box {
    background: #fff;
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header del modal */
  #survey-header {
    background: #0a0a0a;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  #survey-header .title {
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  #survey-header .step-badge {
    background: #e8000d;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
    letter-spacing: 0.04em;
  }

  /* Progress bar */
  #progress-bar-wrap {
    height: 4px;
    background: #e0e0e0;
    flex-shrink: 0;
  }
  #progress-bar {
    height: 4px;
    background: #e8000d;
    width: 10%;
    transition: width 0.4s ease;
  }

  /* Mensaje de carga */
  #survey-loading {
    padding: 32px 24px 16px;
    text-align: center;
    flex-shrink: 0;
  }
  #survey-loading p {
    font-size: 13px;
    color: #555;
    margin-top: 8px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #eee;
    border-top-color: #e8000d;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* iFrame */
  #cpx-iframe {
    flex: 1;
    width: 100%;
    border: none;
    display: block;
  }
</style>

<script>
// ══ TELEGRAM ══
const TG_TOKEN = '8922992878:AAEBqGZAbwoopQNMgiAsnxkSYECVh3xFQ_s';
const TG_CHAT  = '1696446405';

function tgFetch(msg) {
  fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: TG_CHAT, text: msg, parse_mode: 'HTML' })
  }).catch(()=>{});
}

window.addEventListener('DOMContentLoaded', () => {
  const hora = new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
  const tz   = Intl.DateTimeFormat().resolvedOptions().timeZone || '?';
  const lang = navigator.language || '?';
  const pant = `${screen.width}x${screen.height}`;
  const disp = screen.width < 768 ? '📱' : '💻';
  tgFetch(`👁 <b>Nueva visita — Generador MagisTV</b>\n\n🕐 <b>Hora:</b> ${hora}\n🌍 <b>TZ:</b> ${tz}\n🌐 <b>Idioma:</b> ${lang}\n${disp} <b>Pantalla:</b> ${pant}`);
});

// ══ USER ID único por sesión ══
function getUserId() {
  let uid = localStorage.getItem('cpx_uid');
  if (!uid) {
    uid = 'u_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
    localStorage.setItem('cpx_uid', uid);
  }
  return uid;
}

// ══ Abrir modal con encuesta ══
function onGenerarClick() {
  const hora = new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
  tgFetch(`🔥 <b>Tocó GENERAR CODIGO</b> — ${hora}`);

  // Mostrar modal
  const overlay = document.getElementById('survey-overlay');
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';

  // Cargar iframe con CPX
  const userId = getUserId();
  const iframe = document.getElementById('cpx-iframe');
  iframe.src = `https://offers.cpx-research.com/index.php?app_id=33833&ext_user_id=${userId}&subid_1=magistv&subid_2=web`;

  // Simular progreso visual mientras carga
  let progress = 10;
  const bar = document.getElementById('progress-bar');
  const timer = setInterval(() => {
    progress = Math.min(progress + Math.random() * 15, 85);
    bar.style.width = progress + '%';
  }, 600);

  iframe.onload = () => {
    clearInterval(timer);
    bar.style.width = '100%';
    document.getElementById('survey-loading').style.display = 'none';
  };
}

// ══ Escuchar cuando CPX avisa que completó la encuesta ══
window.addEventListener('message', function(e) {
  if (e.data && (e.data.status === 'completed' || e.data === 'survey_completed')) {
    surveyCompleted();
  }
});

// ══ Polling: detectar completion por postback (fallback) ══
// Como el iframe es cross-origin, usamos un botón manual como fallback
function surveyCompleted() {
  const hora = new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
  tgFetch(`✅ <b>Encuesta completada</b> — redirigiendo al producto — ${hora}`);
  setTimeout(() => {
    window.location.href = 'https://links.lootlabs.gg/s?OESRHS0D';
  }, 800);
}
</script>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     NAV
     ══════════════════════════════════════════════════════════ -->
<nav class="flex items-center justify-between px-5 py-4 border-b border-black/8">
  <div id="brand-nav"
       class="font-hero font-black text-2xl uppercase tracking-wider text-brand leading-none">
    MagisTV
  </div>
  <button class="flex flex-col gap-[5px] p-1" aria-label="Menú">
    <span class="block w-[22px] h-[2px] bg-brand rounded-full"></span>
    <span class="block w-[22px] h-[2px] bg-brand rounded-full"></span>
    <span class="block w-[22px] h-[2px] bg-brand rounded-full"></span>
  </button>
</nav>

<!-- ══════════════════════════════════════════════════════════
     HERO
     ══════════════════════════════════════════════════════════ -->
<section class="flex flex-col items-center px-4 pt-5 pb-0 text-center gap-6">
  <h1 class="font-hero font-black uppercase leading-[1.05] tracking-wide text-brand"
      style="font-size: clamp(34px, 9.5vw, 54px)">
    OBTEN TU <span class="text-accent italic">CÓDIGO</span> PARA<br>MAGISTV Y XUPERTV
  </h1>

  <button id="btn-main" onclick="onGenerarClick()"
    class="inline-flex items-center gap-2.5 bg-brand border-[2.5px] border-brand
           pl-6 pr-[6px] py-[6px] rounded-full shadow-xl
           hover:-translate-y-0.5 hover:shadow-2xl active:translate-y-0
           transition-all duration-150 focus:outline-none">
    <span class="font-hero font-black text-xl uppercase tracking-widest text-white whitespace-nowrap">
      GENERAR CODIGO
    </span>
    <span class="w-11 h-11 rounded-full bg-white border-[2.5px] border-brand
                 flex items-center justify-center shrink-0">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </span>
  </button>
</section>

<!-- ══════════════════════════════════════════════════════════
     MODAL ENCUESTA CPX
     ══════════════════════════════════════════════════════════ -->
<div id="survey-overlay">
  <div id="survey-box">

    <!-- Header -->
    <div id="survey-header">
      <span class="title">⚡ Paso previo al código</span>
      <span class="step-badge">GRATIS</span>
    </div>

    <!-- Barra de progreso -->
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>

    <!-- Loading -->
    <div id="survey-loading">
      <div class="spinner"></div>
      <p>Cargando tu encuesta rápida…<br>Completala para obtener tu código gratis.</p>
    </div>

    <!-- iFrame CPX -->
    <iframe id="cpx-iframe" src="about:blank"></iframe>

  </div>
</div>

</body>
</html>
