<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Código MagisTV / XuperTV</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,800;0,900;1,900&family=JetBrains+Mono:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Google IMA SDK — librería oficial para reproducir anuncios VAST/VPAID -->
<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          hero: ["'Barlow Condensed'", "Arial Narrow", "sans-serif"],
          mono: ["'JetBrains Mono'", "monospace"],
          body: ["'Inter'", "sans-serif"],
        },
        colors: {
          brand:   "#0a0a0a",
          accent:  "#e8000d",
          success: "#00c896",
          muted:   "#888888",
          bg:      "#e8e8ed",
        },
        keyframes: {
          popIn:      { from: { transform:"scale(0.88)", opacity:"0" }, to: { transform:"scale(1)", opacity:"1" } },
          fadeSwap:   { "0%,100%": { opacity:"1" }, "40%,60%": { opacity:"0" } },
          pulse2:     { "0%,100%": { boxShadow:"0 0 0 0 rgba(0,200,150,0.4)" }, "50%": { boxShadow:"0 0 0 10px rgba(0,200,150,0)" } },
          borderGlow: { "0%,100%": { boxShadow:"0 0 0px 0px rgba(232,0,13,0)", borderColor:"rgba(232,0,13,0.2)" }, "50%": { boxShadow:"0 0 20px 7px rgba(232,0,13,0.5)", borderColor:"rgba(232,0,13,1)" } },
          playBounce: { "0%,100%": { transform:"translateY(0px) scale(1)", opacity:"0.65" }, "50%": { transform:"translateY(-6px) scale(1.08)", opacity:"1" } },
        },
        animation: {
          popIn:      "popIn 0.3s cubic-bezier(.22,.68,0,1.2) forwards",
          fadeSwap:   "fadeSwap 0.5s ease forwards",
          pulse2:     "pulse2 1.5s infinite",
          borderGlow: "borderGlow 1s ease-in-out infinite",
          playBounce: "playBounce 1s ease-in-out infinite",
        },
      },
    },
  };
</script>

<style>
  * { box-sizing: border-box; }
  body { font-family: "Inter", sans-serif; background: #e8e8ed; min-height: 100vh; }

  /* ── Ring countdown ─────────────────────────────────────── */
  .ring-progress {
    fill: none; stroke: #0a0a0a; stroke-width: 5;
    stroke-linecap: round; stroke-dasharray: 176; stroke-dashoffset: 0;
    transform: rotate(-90deg); transform-origin: 30px 30px;
    transition: stroke-dashoffset 1s linear;
  }
  .ring-bg { fill: none; stroke: #e0e0e0; stroke-width: 5; }

  /* ── Contenedor del player IMA ──────────────────────────── */
  #video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #0d0d0d;
    border-radius: 14px;
    overflow: visible;           /* visible para que el glow no se corte */
    cursor: pointer;
  }
  /* Recorte interno para que el video no salga del borde */
  #video-wrapper > * { border-radius: 14px; overflow: hidden; }
  #ima-content-video { border-radius: 14px; overflow: hidden; }

  /* Estado IDLE — borde rojo pulsante */
  #video-wrapper.idle-glow {
    border: 2.5px solid rgba(232,0,13,0.2);
    animation: borderGlow 1s ease-in-out infinite;
  }
  /* Estado PLAYING — sin borde */
  #video-wrapper.playing {
    border: none;
    animation: none;
    box-shadow: none;
  }

  /* El <video> nativo que usa IMA como content video */
  #ima-content-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: #0d0d0d;
    border-radius: 12px;
  }

  /* Contenedor donde IMA inyecta el anuncio encima del video */
  #ima-ad-container {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    overflow: hidden;
  }

  /* ── Overlay "Tocá para reproducir" (mobile) ────────────── */
  #play-overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 100%);
    border-radius: 12px;
    cursor: pointer;
    transition: opacity 0.3s;
  }
  #play-overlay .play-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2.5px solid rgba(255,255,255,0.35);
    display: flex; align-items: center; justify-content: center;
    animation: playBounce 1s ease-in-out infinite;
  }
  #play-overlay:active .play-btn {
    background: rgba(255,255,255,0.28);
    animation: none;
    transform: scale(0.93);
  }
  #play-overlay .play-label {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.55);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    animation: playBounce 1s ease-in-out infinite;
  }
  #play-overlay .play-hint {
    font-size: 10px;
    color: rgba(255,255,255,0.28);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: -4px;
  }

  /* ── Barra de progreso roja ──────────────────────────────── */
  #video-progress-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: #e8000d;
    width: 0%;
    z-index: 20;
    transition: width 1s linear;
    border-radius: 0 2px 2px 0;
  }

  /* ── Label PUBLICIDAD ───────────────────────────────────── */
  #pub-label {
    position: absolute;
    top: 8px; right: 10px;
    font-size: 8px;
    letter-spacing: 1.8px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    pointer-events: none;
    z-index: 20;
    background: rgba(0,0,0,0.4);
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* ── Contador grande ─────────────────────────────────────── */
  #countdown-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin: 14px 0 16px;
  }
  #countdown-number {
    font-family: "JetBrains Mono", monospace;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    color: #0a0a0a;
    letter-spacing: -1px;
  }
  #countdown-label {
    font-size: 11px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* ── Step dots ──────────────────────────────────────────── */
  .step-dot { width: 8px; height: 8px; border-radius: 4px; background: #e0e0e0; transition: all 0.3s; }
  .step-dot.active { background: #0a0a0a; width: 22px; border-radius: 4px; }
  .step-dot.done   { background: #00c896; }

  /* ── Skip button ────────────────────────────────────────── */
  #btn-skip {
    width: 100%; padding: 14px; border-radius: 13px;
    font-size: 14px; font-weight: 600; cursor: not-allowed;
    background: #f0f0f0; border: 1.5px solid #ddd; color: #aaa;
    transition: all 0.35s;
  }
  #btn-skip.ready {
    background: #0a0a0a; border-color: #0a0a0a; color: #fff;
    cursor: pointer; animation: pulse2 1.5s infinite;
  }

  /* ── Code display ───────────────────────────────────────── */
  .code-number {
    font-family: "JetBrains Mono", monospace;
    font-size: 32px; font-weight: 700;
    letter-spacing: 7px; color: #0a0a0a;
  }

  .swapping { animation: fadeSwap 0.5s ease forwards; }
  .sheet    { animation: popIn 0.3s cubic-bezier(.22,.68,0,1.2) forwards; }

  /* ── Banner zone ────────────────────────────────────────── */
  #hta-banner-zone {
    width: 100%; min-height: 90px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; margin-top: 12px;
  }
</style>
</head>

<div id="overlay"
     class="hidden fixed inset-0 z-50 bg-black/55 backdrop-blur-sm
            flex items-center justify-center px-4 py-6"

  <div class="sheet bg-white rounded-[20px] w-full max-w-[360px]

    <div id="step-ad">

      <p class="text-center text-[12px] font-semibold text-muted uppercase tracking-widest mb-3">

<!-- ══════════════════════════════════════════════════════════
     JAVASCRIPT — IMA SDK + lógica principal
     ══════════════════════════════════════════════════════════ -->
<script>
/* ══════════════════════════════════════════════════════════════
   CONFIG
   ══════════════════════════════════════════════════════════ */
const DURATION = 25;

const HTA_POPUNDER_URL = "https://motionless-bus.com/b.3OVg0XPa3XpFvPbVmmVEJHZnDj0j3BM-TmQF0/NFTokjzUL/TEcGxjNsDOQy1xOSThcc";

// URL VAST para Google IMA SDK (zona 7144673 de HilltopAds)
const HTA_VAST_IMA_URL = "https://second-director.com/dxmKFozmd.GQNzvvZQGWU-/heFm_9SuJZqUGl/kOP/T/c-xqNeDPQd2xNEzqMwtHNizfEd0eN/DdYu3xNbytZrs/avWA1Rppd/D/0bxN";

/* ══════════════════════════════════════════════════════════════
   ESTADO
   ══════════════════════════════════════════════════════════ */
let timer          = null;
let currentCode    = '';
let brandIndex     = 0;
let imaReady       = false;   // IMA SDK inicializado con gesto de usuario
let adsManager     = null;    // instancia activa del AdsManager
let adDisplayContainer = null;

const brands  = ['MagisTV', 'XuperTV'];
const brandEl = document.getElementById('brand-nav');
const C       = 2 * Math.PI * 28;

/* ── Rotación nav ────────────────────────────────────────── */
setInterval(() => {
  brandEl.classList.add('swapping');
  setTimeout(() => {
    brandIndex = (brandIndex + 1) % brands.length;
    brandEl.textContent = brands[brandIndex];
    brandEl.classList.remove('swapping');
  }, 250);
}, 15000);

function generateCode() {
  return Math.floor(1000000 + Math.random() * 9000000).toString();
}

/* ══════════════════════════════════════════════════════════════
   CLICK PRINCIPAL
   ══════════════════════════════════════════════════════════ */
function onMainClick() {
  // 1. Popunder
  try {
    var popWin = window.open(HTA_POPUNDER_URL, '_blank');
    if (popWin) { popWin.blur(); window.focus(); }
  } catch(e) {}

  // 2. Abrir modal
  openSheet();
}

/* ══════════════════════════════════════════════════════════════
   MODAL
   ══════════════════════════════════════════════════════════ */
function openSheet() {
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('overlay').classList.add('flex');
  resetStepAd();
  // ⚠️ El contador NO arranca aquí — arranca cuando el usuario
  // toca el overlay de play (startAdOnUserGesture)
}

function closeSheet() {
  clearInterval(timer);
  destroyIma();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('overlay').classList.remove('flex');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeSheet();
}

function resetStepAd() {
  clearInterval(timer);   // por si había un contador corriendo
  currentCode = generateCode();
  document.getElementById('step-ad').classList.remove('hidden');
  document.getElementById('step-code').classList.add('hidden');
  document.getElementById('btn-skip').classList.remove('ready');
  document.getElementById('btn-skip').textContent = 'Obtener código (esperá el anuncio)';
  document.getElementById('countdown-number').textContent = DURATION;
  document.getElementById('ring').style.strokeDashoffset = 0;
  document.getElementById('video-progress-bar').style.width = '0%';
  document.getElementById('countdown-label').textContent = 'segundos restantes';

  // Activar borde rojo pulsante mientras espera el tap
  var wrapper = document.getElementById('video-wrapper');
  wrapper.classList.add('idle-glow');
  wrapper.classList.remove('playing');

  // Mostrar overlay de play
  var po = document.getElementById('play-overlay');
  po.style.display = '';
  po.style.opacity = '1';

  updateDots(1);
  imaReady = false;
}

/* ══════════════════════════════════════════════════════════════
   GOOGLE IMA SDK
   ══════════════════════════════════════════════════════════

   FLUJO IMA:
   1. Usuario toca #play-overlay → startAdOnUserGesture()
   2. Se crea AdDisplayContainer (debe crearse dentro de un
      gesto de usuario para que el audio funcione en mobile)
   3. Se inicializa con .initialize()
   4. Se pide el anuncio via AdsLoader.requestAds()
   5. IMA dispara LOADED → se crea el AdsManager
   6. AdsManager.start() → reproduce el video
   7. Eventos AD_ERROR / ALL_ADS_COMPLETED → fallback/fin
   ══════════════════════════════════════════════════════════ */

var adsLoader = null;

function startAdOnUserGesture() {
  if (imaReady) return;
  imaReady = true;

  // Ocultar overlay de play
  var po = document.getElementById('play-overlay');
  po.style.opacity = '0';
  po.style.transition = 'opacity 0.3s';
  setTimeout(function() { po.style.display = 'none'; }, 300);

  // Iniciar IMA y el contador al mismo tiempo
  initIma();
  startCountdown();
}

function initIma() {
  var videoEl    = document.getElementById('ima-content-video');
  var adContainer = document.getElementById('ima-ad-container');

  // Crear AdDisplayContainer
  adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, videoEl);
  adDisplayContainer.initialize();   // DEBE llamarse dentro de un gesto de usuario

  // Crear AdsLoader
  adsLoader = new google.ima.AdsLoader(adDisplayContainer);

  // Escuchar eventos del loader
  adsLoader.addEventListener(
    google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
    onAdsManagerLoaded,
    false
  );
  adsLoader.addEventListener(
    google.ima.AdErrorEvent.Type.AD_ERROR,
    onAdError,
    false
  );

  // Construir la solicitud de anuncio
  var adsRequest = new google.ima.AdsRequest();
  adsRequest.adTagUrl = HTA_VAST_IMA_URL;

  // Dimensiones del contenedor (IMA las necesita para escalar el ad)
  var wrapper = document.getElementById('video-wrapper');
  adsRequest.linearAdSlotWidth  = wrapper.offsetWidth;
  adsRequest.linearAdSlotHeight = wrapper.offsetHeight;
  adsRequest.nonLinearAdSlotWidth  = wrapper.offsetWidth;
  adsRequest.nonLinearAdSlotHeight = wrapper.offsetHeight;

  adsLoader.requestAds(adsRequest);
}

function onAdsManagerLoaded(adsManagerLoadedEvent) {
  var videoEl = document.getElementById('ima-content-video');

  // Crear el AdsManager con configuración de rendering
  var adsRenderingSettings = new google.ima.AdsRenderingSettings();
  adsRenderingSettings.restoreCustomPlaybackStateOnAdBreakComplete = true;

  adsManager = adsManagerLoadedEvent.getAdsManager(videoEl, adsRenderingSettings);

  // Eventos del AdsManager
  adsManager.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR,       onAdError);
  adsManager.addEventListener(google.ima.AdEvent.Type.ALL_ADS_COMPLETED,   onAllAdsCompleted);
  adsManager.addEventListener(google.ima.AdEvent.Type.CONTENT_PAUSE_REQUESTED, function() {
    videoEl.pause();
  });
  adsManager.addEventListener(google.ima.AdEvent.Type.CONTENT_RESUME_REQUESTED, function() {
    // No hay contenido real que reanudar
  });
  adsManager.addEventListener(google.ima.AdEvent.Type.STARTED, function() {
    // El anuncio empezó — quitar el glow y poner estado "playing"
    var wrapper = document.getElementById('video-wrapper');
    wrapper.classList.remove('idle-glow');
    wrapper.classList.add('playing');
  });

  // Iniciar el AdsManager con las dimensiones del contenedor
  var wrapper = document.getElementById('video-wrapper');
  try {
    adsManager.init(wrapper.offsetWidth, wrapper.offsetHeight, google.ima.ViewMode.NORMAL);
    adsManager.start();
  } catch(e) {
    onAdError(e);
  }
}

function onAdError(adErrorEvent) {
  // Si el anuncio falla, liberamos IMA y dejamos el contador correr
  console.warn('IMA Ad Error:', adErrorEvent);
  if (adsManager) { adsManager.destroy(); adsManager = null; }
  // Mostrar estado "sin anuncio" en el wrapper
  var wrapper = document.getElementById('video-wrapper');
  var existing = wrapper.querySelector('#ad-error-msg');
  if (!existing) {
    var msg = document.createElement('div');
    msg.id = 'ad-error-msg';
    msg.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;' +
      'justify-content:center;background:#0d0d0d;color:rgba(255,255,255,0.35);' +
      'font-size:11px;letter-spacing:1px;text-transform:uppercase;z-index:5;';
    msg.textContent = 'Anuncio no disponible';
    wrapper.appendChild(msg);
  }
}

function onAllAdsCompleted() {
  // El anuncio terminó — si el contador no llegó a 0 todavía, lo dejamos correr
  if (adsManager) { adsManager.destroy(); adsManager = null; }
}

function destroyIma() {
  if (adsManager) { adsManager.destroy(); adsManager = null; }
  if (adDisplayContainer) { adDisplayContainer.destroy(); adDisplayContainer = null; }
  if (adsLoader) { adsLoader.contentComplete(); adsLoader = null; }
  imaReady = false;

  // Limpiar mensaje de error si existiera
  var msg = document.getElementById('ad-error-msg');
  if (msg) msg.remove();
}

/* ══════════════════════════════════════════════════════════════
   CONTADOR
   ══════════════════════════════════════════════════════════ */
function startCountdown() {
  let remaining = DURATION;
  clearInterval(timer);

  timer = setInterval(() => {
    remaining--;
    document.getElementById('countdown-number').textContent = remaining;
    document.getElementById('ring').style.strokeDashoffset =
      C * (1 - remaining / DURATION);

    const pct = ((DURATION - remaining) / DURATION) * 100;
    document.getElementById('video-progress-bar').style.width = pct + '%';

    if (remaining <= 0) {
      clearInterval(timer);
      unlockButton();
    }
  }, 1000);
}

function unlockButton() {
  const btn = document.getElementById('btn-skip');
  btn.textContent = '🔓 Obtener mi código';
  btn.classList.add('ready');
  document.getElementById('countdown-label').textContent = '¡Listo!';
}

function skipAd() {
  if (!document.getElementById('btn-skip').classList.contains('ready')) return;
  clearInterval(timer);
  destroyIma();
  document.getElementById('step-ad').classList.add('hidden');
  document.getElementById('step-code').classList.remove('hidden');
  document.getElementById('code-display').textContent = currentCode;
  updateDots(2);
}

/* ══════════════════════════════════════════════════════════════
   UTILIDADES
   ══════════════════════════════════════════════════════════ */
function copyCode() {
  navigator.clipboard.writeText(currentCode).then(() => {
    const b = document.getElementById('btn-copy');
    b.textContent = '✅ ¡Copiado!';
    setTimeout(() => { b.textContent = '📋 Copiar código'; }, 2000);
  }).catch(() => {
    const el = document.createElement('textarea');
    el.value = currentCode; document.body.appendChild(el);
    el.select(); document.execCommand('copy');
    document.body.removeChild(el);
    const b = document.getElementById('btn-copy');
    b.textContent = '✅ ¡Copiado!';
    setTimeout(() => { b.textContent = '📋 Copiar código'; }, 2000);
  });
}

function resetAll() {
  closeSheet();
  setTimeout(() => openSheet(), 220);
}

function updateDots(active) {
  for (let i = 1; i <= 2; i++) {
    const d = document.getElementById('dot' + i);
    d.classList.remove('active', 'done');
    if (i < active)  d.classList.add('done');
    if (i === active) d.classList.add('active');
  }
}
</script>
