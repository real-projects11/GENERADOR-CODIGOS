<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Código MagisTV / XuperTV</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,800;0,900;1,900&family=JetBrains+Mono:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          hero: ["'Barlow Condensed'", "Arial Narrow", "sans-serif"],
          mono: ["'JetBrains Mono'", "monospace"],
          body: ["'Inter'", "sans-serif"],
        },
        colors: {
          brand:   "#0a0a0a",
          accent:  "#e8000d",
          success: "#00c896",
          muted:   "#888888",
          bg:      "#e8e8ed",
        },
        keyframes: {
          popIn:    { from: { transform:"scale(0.88)", opacity:"0" }, to: { transform:"scale(1)", opacity:"1" } },
          fadeSwap: { "0%,100%": { opacity:"1" }, "40%,60%": { opacity:"0" } },
          pulse2:   { "0%,100%": { boxShadow:"0 0 0 0 rgba(0,200,150,0.4)" }, "50%": { boxShadow:"0 0 0 10px rgba(0,200,150,0)" } },
          shimmer:  { "0%": { backgroundPosition:"200% 0" }, "100%": { backgroundPosition:"-200% 0" } },
        },
        animation: {
          popIn:    "popIn 0.3s cubic-bezier(.22,.68,0,1.2) forwards",
          fadeSwap: "fadeSwap 0.5s ease forwards",
          pulse2:   "pulse2 1.5s infinite",
          shimmer:  "shimmer 2s linear infinite",
        },
      },
    },
  };
</script>

<style>
  * { box-sizing: border-box; }
  body { font-family: "Inter", sans-serif; background: #e8e8ed; min-height: 100vh; }

  /* ── Ring countdown ─────────────────────────────────────── */
  .ring-progress {
    fill: none; stroke: #0a0a0a; stroke-width: 5;
    stroke-linecap: round; stroke-dasharray: 176; stroke-dashoffset: 0;
    transform: rotate(-90deg); transform-origin: 30px 30px;
    transition: stroke-dashoffset 1s linear;
  }
  .ring-bg { fill: none; stroke: #e0e0e0; stroke-width: 5; }

  /* ── Video wrapper ──────────────────────────────────────── */
  #video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #0d0d0d;
    border-radius: 14px;
    overflow: hidden;
  }

  /* ── VAST iframe ────────────────────────────────────────── */
  #vast-iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    z-index: 2;
    display: block;
  }

  /* ── Fallback (se muestra si iframe no carga) ───────────── */
  #vast-fallback {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 100%);
  }
  #vast-fallback .pulse-ring {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    animation: pulse2 1.8s infinite;
  }

  /* ── Shimmer loading bar ────────────────────────────────── */
  #vast-loading-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    z-index: 3;
    background: linear-gradient(90deg,
      transparent 0%, #e8000d 40%, #ff6b6b 50%, #e8000d 60%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 1.6s linear infinite;
  }

  /* ── Progress bar ───────────────────────────────────────── */
  #video-progress-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: #e8000d;
    width: 0%;
    z-index: 4;
    transition: width 1s linear;
    border-radius: 0 2px 2px 0;
  }

  /* ── PUBLICIDAD label ───────────────────────────────────── */
  #pub-label {
    position: absolute;
    top: 8px; right: 10px;
    font-size: 8px;
    letter-spacing: 1.8px;
    font-weight: 700;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    pointer-events: none;
    z-index: 5;
    background: rgba(0,0,0,0.35);
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* ── Contador central grande ────────────────────────────── */
  #countdown-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin: 14px 0 16px;
  }
  #countdown-number {
    font-family: "JetBrains Mono", monospace;
    font-size: 52px;
    font-weight: 700;
    line-height: 1;
    color: #0a0a0a;
    letter-spacing: -2px;
  }
  #countdown-label {
    font-size: 11px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* ── Ring pequeño (decorativo, debajo del número) ───────── */
  #ring-wrap {
    position: relative;
    width: 56px; height: 56px;
  }
  #ring-wrap svg { position: absolute; inset: 0; }

  /* ── Step dots ──────────────────────────────────────────── */
  .step-dot { width: 8px; height: 8px; border-radius: 4px; background: #e0e0e0; transition: all 0.3s; }
  .step-dot.active { background: #0a0a0a; width: 22px; border-radius: 4px; }
  .step-dot.done   { background: #00c896; }

  /* ── Skip button ────────────────────────────────────────── */
  #btn-skip {
    width: 100%; padding: 14px; border-radius: 13px;
    font-size: 14px; font-weight: 600; cursor: not-allowed;
    background: #f0f0f0; border: 1.5px solid #ddd; color: #aaa;
    transition: all 0.35s;
  }
  #btn-skip.ready {
    background: #0a0a0a; border-color: #0a0a0a; color: #fff;
    cursor: pointer; animation: pulse2 1.5s infinite;
  }

  /* ── Code display ───────────────────────────────────────── */
  .code-number {
    font-family: "JetBrains Mono", monospace;
    font-size: 32px; font-weight: 700;
    letter-spacing: 7px; color: #0a0a0a;
  }

  /* ── Brand swap ─────────────────────────────────────────── */
  .swapping { animation: fadeSwap 0.5s ease forwards; }

  /* ── Modal animation ────────────────────────────────────── */
  .sheet { animation: popIn 0.3s cubic-bezier(.22,.68,0,1.2) forwards; }

  /* ── Banner zone ────────────────────────────────────────── */
  #hta-banner-zone {
    width: 100%; min-height: 90px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; margin-top: 12px;
  }
</style>
</head>

  <div class="sheet bg-white rounded-[20px] w-full max-w-[360px]
              px-5 pb-7 pt-5 overflow-y-auto max-h-[92vh]">

    <!-- Step dots -->
    <div class="flex items-center justify-center gap-1.5 mb-4">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot"        id="dot2"></div>

    <!-- ════════════════════════════════════════════════════

    <div id="step-ad">

      <!-- Etiqueta superior -->
      <p class="text-center text-[12px] font-semibold text-muted uppercase tracking-widest mb-3">

      </p>

      <!-- ── VIDEO WRAPPER — VAST iframe adentro ───────────
           ESTRATEGIA:
           • El iframe carga la URL del VAST de HilltopAds.
             HilltopAds entrega una landing/player HTML que
             se renderiza directamente en el iframe. Es la

           • #vast-fallback queda detrás (z-index:1). Si el
             iframe no carga contenido visible, el fallback
             muestra un fondo animado con el contador grande.
           • #vast-loading-bar se oculta al cabo de 3 seg.
           ─────────────────────────────────────────────────── -->
      <div id="video-wrapper" class="mb-0">

        <!-- Shimmer de carga (se oculta a los 3s) -->
        <div id="vast-loading-bar"></div>

        <!-- VAST iframe — cargado en openSheet() vía JS para
             evitar petición en el primer render de página    -->
        <iframe id="vast-iframe"
                src="about:blank"
                allow="autoplay; fullscreen; payment"
                allowfullscreen

        <!-- Fallback visual (visible mientras iframe carga) -->
        <div id="vast-fallback">

        <div id="video-progress-bar"></div>

        <div id="pub-label">Publicidad</div>

      <div id="countdown-block">

            <circle class="ring-progress" cx="30" cy="30" r="28" id="ring"/>

          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">

<!-- ══════════════════════════════════════════════════════════
     JAVASCRIPT PRINCIPAL
     ══════════════════════════════════════════════════════════ -->
<script>
/* ── Config ──────────────────────────────────────────────── */
const DURATION = 25;   // segundos del contador

/* ── URLs HilltopAds ─────────────────────────────────────── */
const HTA_POPUNDER_URL = "https://motionless-bus.com/b.3OVg0XPa3XpFvPbVmmVEJHZnDj0j3BM-TmQF0/NFTokjzUL/TEcGxjNsDOQy1xOSThcc";
const HTA_VAST_URL     = "https://second-director.com/dQm.F/zQdmGJNHvWZFGDUE/Eexml9euqZKUGlskmPsT/cTxGNED-Q/2PMkD_k/tZNNz/Eh0HNODCYXxbMewU";

/* ── Estado interno ──────────────────────────────────────── */
let timer         = null;
let currentCode   = '';
let brandIndex    = 0;
let vastLoaded    = false;
const brands      = ['MagisTV', 'XuperTV'];
const brandEl     = document.getElementById('brand-nav');
const C           = 2 * Math.PI * 28;   // circunferencia ring (r=28)

/* ── Rotación de marca ───────────────────────────────────── */
setInterval(() => {
  brandEl.classList.add('swapping');
  setTimeout(() => {
    brandIndex = (brandIndex + 1) % brands.length;
    brandEl.textContent = brands[brandIndex];
    brandEl.classList.remove('swapping');
  }, 250);
}, 15000);

/* ── Generar código ──────────────────────────────────────── */
function generateCode() {
  return Math.floor(1000000 + Math.random() * 9000000).toString();
}

/* ════════════════════════════════════════════════════════════
   onMainClick()
   Dispara en el mismo gesto de usuario (requerido por los
   navegadores para permitir window.open):
     1. Popunder en background
     2. Abre el modal con el VAST adentro
   ══════════════════════════════════════════════════════════ */
function onMainClick() {

  /* 1. POPUNDER ───────────────────────────────────────────── */
  try {
    var popWin = window.open(HTA_POPUNDER_URL, '_blank');
    if (popWin) { popWin.blur(); window.focus(); }
  } catch(e) {
    console.log('Popunder bloqueado:', e);
  }

  /* 2. MODAL con VAST adentro ─────────────────────────────── */
  openSheet();
}

/* ── Abrir modal ─────────────────────────────────────────── */
function openSheet() {
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('overlay').classList.add('flex');
  resetStepAd();
  loadVast();        // ← inyecta el VAST iframe
  startCountdown();
}

/* ════════════════════════════════════════════════════════════
   loadVast()
   Carga el VAST de HilltopAds dentro del iframe del modal.

   POR QUÉ IFRAME:
   La URL de HilltopAds Video VAST entrega directamente una
   landing HTML con el reproductor embebido. No es un XML VAST
   estándar que necesite un SDK; es una URL de destino que
   renderiza el anuncio. Por eso el iframe es la solución más
   simple, sin librerías externas.

   FALLBACK:
   Si el iframe no recibe contenido (bloqueador de ads,
   sandbox, cookie wall), el #vast-fallback negro con el
   ícono de play queda visible debajo. El contador sigue
   corriendo normalmente — el usuario igual debe esperar.
   ══════════════════════════════════════════════════════════ */
function loadVast() {
  var iframe = document.getElementById('vast-iframe');
  var fallback = document.getElementById('vast-fallback');
  var loadingBar = document.getElementById('vast-loading-bar');

  // Añadir cachebuster para evitar que el ad server repita el mismo creativo
  var cb = Math.floor(Math.random() * 1e9);
  iframe.src = HTA_VAST_URL + (HTA_VAST_URL.indexOf('?') > -1 ? '&' : '?') + 'cb=' + cb;

  vastLoaded = false;

  // Ocultar el shimmer de carga a los 3 segundos
  setTimeout(function() {
    loadingBar.style.display = 'none';
  }, 3000);

  // Cuando el iframe carga algo, ocultamos el fallback
  iframe.onload = function() {
    // Pequeño delay para que el player interno termine de pintar
    setTimeout(function() {
      try {
        // Si el iframe tiene contenido real, ocultamos el fallback
        var doc = iframe.contentDocument || iframe.contentWindow.document;
        if (doc && doc.body && doc.body.innerHTML.trim().length > 50) {
          fallback.style.opacity = '0';
          fallback.style.transition = 'opacity 0.4s';
          setTimeout(function() { fallback.style.display = 'none'; }, 400);
          vastLoaded = true;
        }
      } catch(e) {
        // Cross-origin: si no podemos leer el documento, asumimos que cargó
        // (el servidor de HilltopAds está en dominio diferente)
        fallback.style.opacity = '0';
        fallback.style.transition = 'opacity 0.4s';
        setTimeout(function() { fallback.style.display = 'none'; }, 400);
        vastLoaded = true;
      }
    }, 600);
  };

  // Si el iframe falla del todo, mostramos el fallback con mensaje claro
  iframe.onerror = function() {
    fallback.querySelector('span').textContent = 'Anuncio no disponible';
    loadingBar.style.display = 'none';
  };
}

/* ── Cerrar modal y limpiar iframe ───────────────────────── */
function closeSheet() {
  clearInterval(timer);
  // Detener el VAST descargando el src del iframe
  var iframe = document.getElementById('vast-iframe');
  iframe.src = 'about:blank';
  vastLoaded = false;

  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('overlay').classList.remove('flex');
}

/* ── Click en fondo oscuro ───────────────────────────────── */
function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeSheet();
}

/* ── Resetear step-ad ────────────────────────────────────── */
function resetStepAd() {
  currentCode = generateCode();
  document.getElementById('step-ad').classList.remove('hidden');
  document.getElementById('step-code').classList.add('hidden');
  document.getElementById('btn-skip').classList.remove('ready');
  document.getElementById('btn-skip').textContent = 'Obtener código (esperá el anuncio)';
  document.getElementById('countdown-number').textContent = DURATION;
  document.getElementById('ring').style.strokeDashoffset = 0;
  document.getElementById('video-progress-bar').style.width = '0%';

  // Restaurar fallback para la próxima apertura
  var fallback = document.getElementById('vast-fallback');
  fallback.style.display = '';
  fallback.style.opacity = '1';
  fallback.querySelector('span').textContent = 'Cargando anuncio…';

  // Restaurar loading bar
  var lb = document.getElementById('vast-loading-bar');
  lb.style.display = '';

  updateDots(1);
}

/* ── Contador ────────────────────────────────────────────── */
function startCountdown() {
  let remaining = DURATION;
  clearInterval(timer);

  timer = setInterval(() => {
    remaining--;
    document.getElementById('countdown-number').textContent = remaining;

    // Ring SVG
    document.getElementById('ring').style.strokeDashoffset =
      C * (1 - remaining / DURATION);

    // Barra de progreso roja debajo del video
    const pct = ((DURATION - remaining) / DURATION) * 100;
    document.getElementById('video-progress-bar').style.width = pct + '%';

    if (remaining <= 0) {
      clearInterval(timer);
      unlockButton();
    }
  }, 1000);
}

/* ── Habilitar botón ─────────────────────────────────────── */
function unlockButton() {
  const btn = document.getElementById('btn-skip');
  btn.textContent = '🔓 Obtener mi código';
  btn.classList.add('ready');
  document.getElementById('countdown-label').textContent = '¡Listo!';
}

/* ── Clic en "Obtener código" ────────────────────────────── */
function skipAd() {
  if (!document.getElementById('btn-skip').classList.contains('ready')) return;
  clearInterval(timer);

  // Detener VAST
  document.getElementById('vast-iframe').src = 'about:blank';

  document.getElementById('step-ad').classList.add('hidden');
  document.getElementById('step-code').classList.remove('hidden');
  document.getElementById('code-display').textContent = currentCode;
  updateDots(2);
}

/* ── Copiar código ───────────────────────────────────────── */
function copyCode() {
  navigator.clipboard.writeText(currentCode).then(() => {
    const b = document.getElementById('btn-copy');
    b.textContent = '✅ ¡Copiado!';
    setTimeout(() => { b.textContent = '📋 Copiar código'; }, 2000);
  }).catch(() => {
    const el = document.createElement('textarea');
    el.value = currentCode;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    const b = document.getElementById('btn-copy');
    b.textContent = '✅ ¡Copiado!';
    setTimeout(() => { b.textContent = '📋 Copiar código'; }, 2000);
  });
}

/* ── Resetear todo ───────────────────────────────────────── */
function resetAll() {
  closeSheet();
  setTimeout(() => openSheet(), 220);
}

/* ── Actualizar dots ─────────────────────────────────────── */
function updateDots(active) {
  for (let i = 1; i <= 2; i++) {
    const d = document.getElementById('dot' + i);
    d.classList.remove('active', 'done');
    if (i < active)  d.classList.add('done');
    if (i === active) d.classList.add('active');
  }
}
</script>
